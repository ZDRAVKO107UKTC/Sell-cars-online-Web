services:
  db:
    image: postgres:16-alpine
    container_name: autobg-db
    environment:
      POSTGRES_DB: automobile_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
    container_name: autobg-backend
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: automobile_platform
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: super_secret_jwt_key
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@autobg.local
      ADMIN_PASSWORD: admin12345
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./client
    container_name: autobg-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_UPLOADS_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
